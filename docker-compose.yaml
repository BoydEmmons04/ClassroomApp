services:
  web:
    build:
      context: .
      args:
        INSTALL_DEV_DEPS: "true"
    container_name: classroom_web
    env_file:
      - .env
    environment:
      APP_ENV: development
      FLASK_APP: run.py
      FLASK_ENV: development
      # SECRET_KEY is loaded from .env so Flask can sign sessions securely.
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      # The app builds the SQLAlchemy database URL from these values so special
      # characters in POSTGRES_PASSWORD are handled safely.
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-30}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"
    volumes:
      - .:/app
    # Start Gunicorn directly; run `flask db upgrade` after migrations exist.
    command: >
      sh -c "gunicorn
      --bind 0.0.0.0:5000
      --workers ${WEB_CONCURRENCY:-3}
      --threads ${GUNICORN_THREADS:-2}
      --timeout ${GUNICORN_TIMEOUT:-30}
      --access-logfile -
      --error-logfile -
      run:app"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health/live', timeout=2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: classroom_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: classroom_nginx
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
