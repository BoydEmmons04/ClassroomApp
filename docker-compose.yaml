services:
  web:
    build: .
    container_name: classroom_web
    env_file:
      - .env
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      # SECRET_KEY is loaded from .env so Flask can sign sessions securely.
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      # The app builds the SQLAlchemy database URL from these values so special
      # characters in POSTGRES_PASSWORD are handled safely.
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"
    volumes:
      - .:/app
    # Start Gunicorn directly; run `flask db upgrade` after migrations exist.
    command: sh -c "gunicorn --bind 0.0.0.0:5000 run:app"

  db:
    image: postgres:16-alpine
    container_name: classroom_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: classroom_nginx
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
